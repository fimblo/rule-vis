<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rule-vis</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #111827;
      color: #f3f4f6;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      background: #1f2937;
      border-bottom: 1px solid #374151;
      flex-shrink: 0;
    }

    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.05em; }

    select {
      background: #374151;
      color: #f3f4f6;
      border: 1px solid #4b5563;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.875rem;
      cursor: pointer;
    }

    #ruleset-name {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-left: auto;
    }

    #cy {
      flex: 1;
      display: block;
    }

    #tooltip {
      position: fixed;
      background: #1f2937;
      border: 1px solid #4b5563;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.8rem;
      max-width: 280px;
      pointer-events: none;
      z-index: 10;
      line-height: 1.5;
    }
    #tooltip[hidden] { display: none; }
    #tooltip .tt-name  { font-weight: 600; margin-bottom: 4px; }
    #tooltip .tt-desc  { color: #d1d5db; margin-bottom: 6px; }
    #tooltip .tt-meta  { color: #9ca3af; font-size: 0.75rem; }
    #tt-utilities { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
    .tt-util-row  { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 0.75rem; }
    .tt-util-label { color: #9ca3af; }
    .tt-util-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-weight: 600; font-size: 0.75rem; }
    .pos { background: #14532d; color: #86efac; }
    .neg { background: #7f1d1d; color: #fca5a5; }
    .neu { background: #374151; color: #9ca3af; }

    #legend {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #1f2937cc;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.75rem;
      backdrop-filter: blur(4px);
    }
    #legend h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7280; margin-bottom: 8px; }
    .leg-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .leg-line { width: 24px; height: 3px; border-radius: 2px; }
    .leg-dot  { width: 12px; height: 12px; border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <h1>rule-vis</h1>
  <select id="ruleset-select">
    <option value="rulesets/tic-tac-toe.json">Tic-Tac-Toe</option>
    <option value="rulesets/werewolf.json">Werewolf</option>
    <option value="rulesets/munchkin.json">Munchkin (Simplified)</option>
  </select>
  <span id="ruleset-name"></span>
</header>

<div id="cy"></div>

<div id="tooltip" hidden>
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-desc" id="tt-desc"></div>
  <div class="tt-meta">type: <span id="tt-type"></span></div>
  <div id="tt-utilities"></div>
</div>

<div id="legend">
  <h3>Governs edge (solid)</h3>
  <div class="leg-row"><div class="leg-line" style="background:#4ade80"></div> positive utility</div>
  <div class="leg-row"><div class="leg-line" style="background:#f87171"></div> negative utility</div>
  <div class="leg-row"><div class="leg-line" style="background:#6b7280"></div> neutral utility</div>
  <h3 style="margin-top:10px">Acts-on edge (dashed)</h3>
  <div class="leg-row"><div class="leg-line" style="background:#4ade80;opacity:0.5"></div> positive utility</div>
  <div class="leg-row"><div class="leg-line" style="background:#f87171;opacity:0.5"></div> negative utility</div>
  <div class="leg-row"><div class="leg-line" style="background:#6b7280;opacity:0.5"></div> neutral utility</div>
  <h3 style="margin-top:10px">Entity type</h3>
  <div class="leg-row"><div class="leg-dot" style="background:#7c3aed"></div> game_authority</div>
  <div class="leg-row"><div class="leg-dot" style="background:#1d4ed8"></div> player</div>
  <div class="leg-row"><div class="leg-dot" style="background:#0f766e"></div> game_component</div>
  <div class="leg-row"><div class="leg-dot" style="background:#92400e"></div> group</div>
  <div class="leg-row"><div class="leg-dot" style="background:#374151"></div> other</div>
</div>

<script>
  const NODE_COLORS = {
    game_authority: '#7c3aed',
    player:         '#1d4ed8',
    game_component: '#0f766e',
    group:          '#92400e',
  };

  function nodeColor(type) {
    return NODE_COLORS[type] || '#374151';
  }

  function edgeColor(utility) {
    if (utility > 0) return '#4ade80';
    if (utility < 0) return '#f87171';
    return '#6b7280';
  }

  function utilClass(utility) {
    if (utility > 0) return 'pos';
    if (utility < 0) return 'neg';
    return 'neu';
  }

  function buildElements(data) {
    const nameOf = Object.fromEntries(data.entities.map(e => [e.id, e.name]));

    const nodes = data.entities.map(e => ({
      data: { id: e.id, label: e.name, type: e.type, color: nodeColor(e.type) }
    }));

    const governEdges = data.rules.map(r => ({
      data: {
        id:               r.id,
        source:           r.source_entity,
        target:           r.target_entity,
        rule_name:        r.rule_name,
        rule_type:        r.rule_type,
        description:      r.description,
        color:            edgeColor(r.target_utility),
        edgeKind:         'governs',
        sourceName:       nameOf[r.source_entity],
        targetName:       nameOf[r.target_entity],
        sourceUtility:    r.source_utility,
        targetUtility:    r.target_utility,
        objectName:       r.object_entity ? nameOf[r.object_entity] : null,
        objectUtility:    r.object_utility ?? null,
      }
    }));

    const actsOnEdges = data.rules
      .filter(r => r.object_entity != null)
      .map(r => ({
        data: {
          id:               `${r.id}-obj`,
          source:           r.target_entity,
          target:           r.object_entity,
          rule_name:        r.rule_name,
          rule_type:        r.rule_type,
          description:      r.description,
          color:            edgeColor(r.object_utility),
          edgeKind:         'acts-on',
          sourceName:       nameOf[r.source_entity],
          targetName:       nameOf[r.target_entity],
          sourceUtility:    r.source_utility,
          targetUtility:    r.target_utility,
          objectName:       nameOf[r.object_entity],
          objectUtility:    r.object_utility,
        }
      }));

    return [...nodes, ...governEdges, ...actsOnEdges];
  }

  let cy = null;
  const tooltip     = document.getElementById('tooltip');
  const ttName      = document.getElementById('tt-name');
  const ttDesc      = document.getElementById('tt-desc');
  const ttType      = document.getElementById('tt-type');
  const ttUtilities = document.getElementById('tt-utilities');

  function fmtUtil(u) {
    return u > 0 ? `+${u}` : `${u}`;
  }

  function utilRow(label, utility) {
    return `<div class="tt-util-row">
      <span class="tt-util-label">${label}</span>
      <span class="tt-util-badge ${utilClass(utility)}">${fmtUtil(utility)}</span>
    </div>`;
  }

  function showTooltip(evt, data) {
    ttName.textContent = data.rule_name;
    ttDesc.textContent = data.description || '';
    ttType.textContent = data.rule_type;

    let rows = utilRow(data.sourceName, data.sourceUtility)
             + utilRow(data.targetName, data.targetUtility);
    if (data.objectName != null) {
      rows += utilRow(data.objectName, data.objectUtility);
    }
    ttUtilities.innerHTML = rows;

    positionTooltip(evt.originalEvent);
    tooltip.hidden = false;
  }

  function positionTooltip(e) {
    const pad = 12;
    const tw  = tooltip.offsetWidth  || 280;
    const th  = tooltip.offsetHeight || 80;
    let x = e.clientX + pad;
    let y = e.clientY + pad;
    if (x + tw > window.innerWidth)  x = e.clientX - tw - pad;
    if (y + th > window.innerHeight) y = e.clientY - th - pad;
    tooltip.style.left = `${x}px`;
    tooltip.style.top  = `${y}px`;
  }

  function render(data) {
    document.getElementById('ruleset-name').textContent = data.ruleset?.name ?? '';

    if (cy) { cy.destroy(); cy = null; }

    cy = cytoscape({
      container: document.getElementById('cy'),
      elements:  buildElements(data),

      style: [
        {
          selector: 'node',
          style: {
            'background-color':  'data(color)',
            'label':             'data(label)',
            'color':             '#f9fafb',
            'font-size':         '11px',
            'text-valign':       'center',
            'text-halign':       'center',
            'text-wrap':         'wrap',
            'text-max-width':    '90px',
            'shape':             'round-rectangle',
            'width':             100,
            'height':            40,
            'border-width':      2,
            'border-color':      '#6b7280',
          }
        },
        {
          selector: 'node:selected',
          style: { 'border-color': '#f9fafb', 'border-width': 3 }
        },
        {
          selector: 'node.muted',
          style: {
            'background-color': '#374151',
            'border-color':     '#4b5563',
            'color':            '#6b7280',
            'opacity':          0.45,
          }
        },
        {
          selector: 'edge.hidden',
          style: { 'display': 'none' }
        },
        {
          selector: 'node.hover-highlight',
          style: { 'border-color': '#f9fafb', 'border-width': 3 }
        },
        {
          selector: 'edge',
          style: {
            'line-color':           'data(color)',
            'target-arrow-color':   'data(color)',
            'target-arrow-shape':   'triangle',
            'curve-style':          'bezier',
            'width':                2,
            'opacity':              0.12,
          }
        },
        {
          selector: 'edge[edgeKind = "acts-on"]',
          style: {
            'line-style':        'dashed',
            'line-dash-pattern': [6, 4],
            'width':             1.5,
            'opacity':           0.12,
          }
        },
        {
          selector: 'edge.hover-highlight',
          style: { 'opacity': 0.9 }
        },
        {
          selector: 'edge:selected',
          style: { 'width': 4, 'opacity': 1 }
        },
      ],

      layout: {
        name:                        'cose',
        animate:                     false,
        fit:                         true,
        padding:                     80,
        nodeRepulsion:               400000,
        nodeOverlap:                 20,
        idealEdgeLength:             200,
        edgeElasticity:              100,
        nestingFactor:               5,
        gravity:                     80,
        numIter:                     1000,
        initialTemp:                 200,
        coolingFactor:               0.95,
        minTemp:                     1.0,
        nodeDimensionsIncludeLabels: true,
      }
    });

    function updateEdgeVisibility() {
      cy.edges().forEach(edge => {
        const hide = edge.source().hasClass('muted') || edge.target().hasClass('muted');
        edge.toggleClass('hidden', hide);
      });
    }

    cy.on('tap', 'node', evt => {
      tooltip.hidden = true;
      evt.target.toggleClass('muted');
      updateEdgeVisibility();
    });

    cy.on('mouseover', 'node', evt => {
      const node = evt.target;
      node.addClass('hover-highlight');
      node.connectedEdges().not('.hidden').addClass('hover-highlight');
    });
    cy.on('mouseout', 'node', evt => {
      evt.target.removeClass('hover-highlight');
      evt.target.connectedEdges().removeClass('hover-highlight');
    });

    cy.on('mouseover', 'edge', evt => showTooltip(evt, evt.target.data()));
    cy.on('mousemove', 'edge', evt => positionTooltip(evt.originalEvent));
    cy.on('mouseout',  'edge', ()  => { tooltip.hidden = true; });
    cy.on('tap',       'edge', evt => showTooltip(evt, evt.target.data()));
    cy.on('tap',       'core', ()  => { tooltip.hidden = true; });
  }

  async function load(path) {
    const res  = await fetch(path);
    const data = await res.json();
    render(data);
  }

  document.getElementById('ruleset-select')
    .addEventListener('change', e => load(e.target.value));

  load('rulesets/tic-tac-toe.json');
</script>
</body>
</html>

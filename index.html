<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rule-vis</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #111827;
      color: #f3f4f6;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      background: #1f2937;
      border-bottom: 1px solid #374151;
      flex-shrink: 0;
    }

    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.05em; }

    select {
      background: #374151;
      color: #f3f4f6;
      border: 1px solid #4b5563;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.875rem;
      cursor: pointer;
    }

    #ruleset-name {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-left: auto;
    }

    #cy {
      flex: 1;
      display: block;
    }

    #tooltip {
      position: fixed;
      background: #1f2937;
      border: 1px solid #4b5563;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.8rem;
      max-width: 280px;
      pointer-events: none;
      z-index: 10;
      line-height: 1.5;
    }
    #tooltip[hidden] { display: none; }
    #tooltip .tt-name  { font-weight: 600; margin-bottom: 4px; }
    #tooltip .tt-desc  { color: #d1d5db; margin-bottom: 6px; }
    #tooltip .tt-meta  { color: #9ca3af; font-size: 0.75rem; }
    #tt-utilities { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
    .tt-util-row  { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 0.75rem; }
    .tt-util-label { color: #9ca3af; }
    .tt-util-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-weight: 600; font-size: 0.75rem; }
    .pos { background: #14532d; color: #86efac; }
    .neg { background: #7f1d1d; color: #fca5a5; }
    .neu { background: #374151; color: #9ca3af; }

    #legend {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #1f2937cc;
      border: 1px solid #374151;
      border-radius: 6px;
      font-size: 0.75rem;
      backdrop-filter: blur(4px);
      min-width: 160px;
    }
    #legend-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      cursor: pointer;
      user-select: none;
      gap: 16px;
    }
    #legend-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7280; }
    #legend-toggle { background: none; border: none; color: #6b7280; font-size: 0.75rem; cursor: pointer; padding: 0; line-height: 1; }
    #legend-body { padding: 0 14px 10px; }
    #legend h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7280; margin-bottom: 8px; }
    #legend h3:not(:first-child) { margin-top: 10px; }
    .leg-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .leg-line { width: 24px; height: 3px; border-radius: 2px; }
    .leg-dot  { width: 12px; height: 12px; border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <h1>rule-vis</h1>
  <select id="ruleset-select">
    <option value="rulesets/tic-tac-toe.json">Tic-Tac-Toe</option>
    <option value="rulesets/werewolf.json">Werewolf</option>
    <option value="rulesets/munchkin.json">Munchkin (Simplified)</option>
  </select>
  <span id="ruleset-name"></span>
</header>

<div id="cy"></div>

<div id="tooltip" hidden>
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-desc" id="tt-desc"></div>
  <div class="tt-meta">type: <span id="tt-type"></span></div>
  <div id="tt-utilities"></div>
</div>

<div id="legend">
  <div id="legend-header">
    <span id="legend-title">Legend</span>
    <button id="legend-toggle" aria-label="Toggle legend">▲</button>
  </div>
  <div id="legend-body">
    <h3>Governs edge (solid)</h3>
    <div class="leg-row"><div class="leg-line" style="background:#4ade80"></div> positive utility</div>
    <div class="leg-row"><div class="leg-line" style="background:#f87171"></div> negative utility</div>
    <div class="leg-row"><div class="leg-line" style="background:#6b7280"></div> neutral utility</div>
    <h3>Acts-on edge (dashed)</h3>
    <div class="leg-row"><div class="leg-line" style="background:#4ade80;opacity:0.5"></div> positive utility</div>
    <div class="leg-row"><div class="leg-line" style="background:#f87171;opacity:0.5"></div> negative utility</div>
    <div class="leg-row"><div class="leg-line" style="background:#6b7280;opacity:0.5"></div> neutral utility</div>
    <h3>Entity type</h3>
    <div class="leg-row"><div class="leg-dot" style="background:#7c3aed"></div> game_authority</div>
    <div class="leg-row"><div class="leg-dot" style="background:#1d4ed8"></div> player</div>
    <div class="leg-row"><div class="leg-dot" style="background:#0f766e"></div> game_component</div>
    <div class="leg-row"><div class="leg-dot" style="background:#92400e"></div> group</div>
    <div class="leg-row"><div class="leg-dot" style="background:#374151"></div> other</div>
  </div>
</div>

<script>
  const NODE_COLORS = {
    game_authority: '#7c3aed',
    player:         '#1d4ed8',
    game_component: '#0f766e',
    group:          '#92400e',
  };

  function nodeColor(type) {
    return NODE_COLORS[type] || '#374151';
  }

  function edgeColor(utility) {
    if (utility > 0) return '#4ade80';
    if (utility < 0) return '#f87171';
    return '#6b7280';
  }

  function utilClass(utility) {
    if (utility > 0) return 'pos';
    if (utility < 0) return 'neg';
    return 'neu';
  }

  function buildElements(data) {
    const nameOf = Object.fromEntries(data.entities.map(e => [e.id, e.name]));

    const netAsSubject = {};
    const netAsAffected = {};
    data.entities.forEach(e => { netAsSubject[e.id] = 0; netAsAffected[e.id] = 0; });
    data.rules.forEach(r => {
      netAsSubject[r.subject_entity] += r.subject_utility;
      if (r.affected_entity != null) netAsAffected[r.affected_entity] += (r.affected_utility ?? 0);
    });

    const nodes = data.entities.map(e => {
      const net = (netAsSubject[e.id] ?? 0) + (netAsAffected[e.id] ?? 0);
      const baseLabel = `${e.name}\n(${net > 0 ? '+' : ''}${net})`;
      return {
        data: {
          id:           e.id,
          label:        baseLabel,
          baseLabel:    baseLabel,
          entityName:   e.name,
          type:         e.type,
          color:        nodeColor(e.type),
          borderColor:  net > 0 ? '#4ade80' : net < 0 ? '#f87171' : '#6b7280',
          netUtility:   net,
          netAsSubject:  netAsSubject[e.id],
          netAsAffected:  netAsAffected[e.id],
        }
      };
    });

    const governEdges = data.rules.map(r => ({
      data: {
        id:               r.id,
        source:           r.authority_entity,
        target:           r.subject_entity,
        rule_name:        r.rule_name,
        rule_type:        r.rule_type,
        description:      r.description,
        color:            edgeColor(r.subject_utility),
        edgeKind:         'governs',
        authorityName:       nameOf[r.authority_entity],
        subjectName:       nameOf[r.subject_entity],
        authorityUtility:    r.authority_utility,
        subjectUtility:    r.subject_utility,
        affectedName:       r.affected_entity ? nameOf[r.affected_entity] : null,
        affectedUtility:    r.affected_utility ?? null,
      }
    }));

    const actsOnEdges = data.rules
      .filter(r => r.affected_entity != null)
      .map(r => ({
        data: {
          id:               `${r.id}-obj`,
          source:           r.subject_entity,
          target:           r.affected_entity,
          rule_name:        r.rule_name,
          rule_type:        r.rule_type,
          description:      r.description,
          color:            edgeColor(r.affected_utility),
          edgeKind:         'acts-on',
          authorityName:       nameOf[r.authority_entity],
          subjectName:       nameOf[r.subject_entity],
          authorityUtility:    r.authority_utility,
          subjectUtility:    r.subject_utility,
          affectedName:       nameOf[r.affected_entity],
          affectedUtility:    r.affected_utility,
        }
      }));

    const connectedIds = new Set();
    [...governEdges, ...actsOnEdges].forEach(e => {
      connectedIds.add(e.data.source);
      connectedIds.add(e.data.target);
    });
    const visibleNodes = nodes.filter(n => connectedIds.has(n.data.id));

    return [...visibleNodes, ...governEdges, ...actsOnEdges];
  }

  let cy = null;
  const tooltip     = document.getElementById('tooltip');
  const ttName      = document.getElementById('tt-name');
  const ttDesc      = document.getElementById('tt-desc');
  const ttType      = document.getElementById('tt-type');
  const ttUtilities = document.getElementById('tt-utilities');

  function fmtUtil(u) {
    return u > 0 ? `+${u}` : `${u}`;
  }

  function utilRow(label, utility) {
    return `<div class="tt-util-row">
      <span class="tt-util-label">${label}</span>
      <span class="tt-util-badge ${utilClass(utility)}">${fmtUtil(utility)}</span>
    </div>`;
  }

  function showNodeTooltip(evt, d) {
    ttName.textContent = d.entityName;
    ttDesc.textContent = '';
    ttType.textContent = d.type;
    let rows = utilRow('net utility', d.netUtility);
    if (d.netAsSubject !== 0) rows += utilRow('as subject', d.netAsSubject);
    if (d.netAsAffected !== 0) rows += utilRow('as affected',   d.netAsAffected);
    ttUtilities.innerHTML = rows;
    positionTooltip(evt.originalEvent);
    tooltip.hidden = false;
  }

  function showTooltip(evt, data) {
    ttName.textContent = data.rule_name;
    ttDesc.textContent = data.description || '';
    ttType.textContent = data.rule_type;

    let rows = utilRow(data.authorityName, data.authorityUtility)
             + utilRow(data.subjectName, data.subjectUtility);
    if (data.affectedName != null) {
      rows += utilRow(data.affectedName, data.affectedUtility);
    }
    ttUtilities.innerHTML = rows;

    positionTooltip(evt.originalEvent);
    tooltip.hidden = false;
  }

  function positionTooltip(e) {
    const pad = 12;
    const tw  = tooltip.offsetWidth  || 280;
    const th  = tooltip.offsetHeight || 80;
    let x = e.clientX + pad;
    let y = e.clientY + pad;
    if (x + tw > window.innerWidth)  x = e.clientX - tw - pad;
    if (y + th > window.innerHeight) y = e.clientY - th - pad;
    tooltip.style.left = `${x}px`;
    tooltip.style.top  = `${y}px`;
  }

  function render(data) {
    document.getElementById('ruleset-name').textContent = data.ruleset?.name ?? '';

    if (cy) { cy.destroy(); cy = null; }

    cy = cytoscape({
      container: document.getElementById('cy'),
      elements:  buildElements(data),
      style: [
        {
          selector: 'node',
          style: {
            'background-color':  'data(color)',
            'label':             'data(label)',
            'color':             '#f9fafb',
            'font-size':         '11px',
            'text-valign':       'center',
            'text-halign':       'center',
            'text-wrap':         'wrap',
            'text-max-width':    '90px',
            'shape':             'round-rectangle',
            'width':             100,
            'height':            50,
            'border-width':      2,
            'border-color':      'data(borderColor)',
          }
        },
        {
          selector: 'node:selected',
          style: { 'border-color': '#f9fafb', 'border-width': 3 }
        },
        {
          selector: 'node.pinned',
          style: { 'border-color': '#f9fafb', 'border-width': 3 }
        },
        {
          selector: 'node.muted',
          style: {
            'background-color': '#374151',
            'border-color':     '#4b5563',
            'color':            '#6b7280',
            'opacity':          0.45,
          }
        },
        {
          selector: 'node.hover-highlight',
          style: { 'border-color': '#f9fafb', 'border-width': 3 }
        },
        {
          selector: 'edge',
          style: {
            'line-color':           'data(color)',
            'target-arrow-color':   'data(color)',
            'target-arrow-shape':   'triangle',
            'curve-style':          'bezier',
            'width':                2,
            'opacity':              0.12,
          }
        },
        {
          selector: 'edge[edgeKind = "acts-on"]',
          style: {
            'line-style':        'dashed',
            'line-dash-pattern': [6, 4],
            'width':             1.5,
            'opacity':           0.12,
          }
        },
        {
          selector: 'edge.edge-bright',
          style: { 'opacity': 0.9 }
        },
        {
          selector: 'edge.edge-hidden',
          style: { 'display': 'none' }
        },
        {
          selector: 'edge.hover-highlight',
          style: { 'opacity': 0.9 }
        },
        {
          selector: 'edge:selected',
          style: { 'width': 4, 'opacity': 1 }
        },
      ],

    });

    function updateEdges() {
      cy.edges().forEach(edge => {
        const anyPinned = edge.source().hasClass('pinned') || edge.target().hasClass('pinned');
        const anyMuted  = edge.source().hasClass('muted')  || edge.target().hasClass('muted');
        edge.removeClass('edge-bright edge-hidden');
        if (anyMuted && !anyPinned) {
          edge.addClass('edge-hidden');
        } else if (anyPinned && !anyMuted) {
          edge.addClass('edge-bright');
        }
        // pinned + muted conflict, or neither → dim (default 0.12)
      });
    }

    cy.on('tap', 'node', evt => {
      const node = evt.target;
      tooltip.hidden = true;
      const base = node.data('baseLabel');
      if (node.hasClass('muted')) {
        node.removeClass('muted');
        node.data('label', base);
      } else if (node.hasClass('pinned')) {
        node.removeClass('pinned');
        node.addClass('muted');
        node.data('label', base);
      } else {
        node.addClass('pinned');
        node.data('label', base + ' 📌');
      }
      updateEdges();
    });

    cy.on('mouseover', 'node', evt => {
      const node = evt.target;
      node.addClass('hover-highlight');
      node.connectedEdges().not('.edge-hidden').addClass('hover-highlight');
      showNodeTooltip(evt, node.data());
    });
    cy.on('mousemove', 'node', evt => positionTooltip(evt.originalEvent));
    cy.on('mouseout', 'node', evt => {
      evt.target.removeClass('hover-highlight');
      evt.target.connectedEdges().removeClass('hover-highlight');
      tooltip.hidden = true;
    });

    cy.on('mouseover', 'edge', evt => {
      const edge = evt.target;
      edge.addClass('hover-highlight');
      edge.source().addClass('hover-highlight');
      edge.target().addClass('hover-highlight');
      showTooltip(evt, edge.data());
    });
    cy.on('mousemove', 'edge', evt => positionTooltip(evt.originalEvent));
    cy.on('mouseout', 'edge', evt => {
      const edge = evt.target;
      edge.removeClass('hover-highlight');
      edge.source().removeClass('hover-highlight');
      edge.target().removeClass('hover-highlight');
      tooltip.hidden = true;
    });
    cy.on('tap', 'edge', evt => showTooltip(evt, evt.target.data()));
    cy.on('tap', 'core', ()  => { tooltip.hidden = true; });

    const layout = cy.layout({
      name:                        'cose',
      animate:                     false,
      fit:                         true,
      padding:                     80,
      nodeRepulsion:               400000,
      nodeOverlap:                 20,
      idealEdgeLength:             200,
      edgeElasticity:              100,
      nestingFactor:               5,
      gravity:                     80,
      numIter:                     1000,
      initialTemp:                 200,
      coolingFactor:               0.95,
      minTemp:                     1.0,
      nodeDimensionsIncludeLabels: true,
    });

    layout.on('layoutstop', () => {
      const w = cy.width();
      const h = cy.height();
      const padX = 120;
      const padY = 80;

      // Group nodes by net utility level
      const groups = new Map();
      cy.nodes().forEach(node => {
        const net = node.data('netUtility');
        if (!groups.has(net)) groups.set(net, []);
        groups.get(net).push(node);
      });

      // Sort levels descending: high utility = top of canvas
      const levels = [...groups.keys()].sort((a, b) => b - a);
      const numLevels = levels.length;

      levels.forEach((level, levelIdx) => {
        const nodes = groups.get(level);
        // Preserve cose horizontal ordering within each level
        nodes.sort((a, b) => a.position('x') - b.position('x'));

        const y = numLevels === 1
          ? h / 2
          : padY + (levelIdx / (numLevels - 1)) * (h - 2 * padY);

        nodes.forEach((node, nodeIdx) => {
          const x = nodes.length === 1
            ? w / 2
            : padX + (nodeIdx / (nodes.length - 1)) * (w - 2 * padX);
          node.position({ x, y });
        });
      });

      cy.fit(cy.elements(), 80);
    });

    layout.run();
  }

  async function load(path) {
    const res  = await fetch(path);
    const data = await res.json();
    render(data);
  }

  document.getElementById('ruleset-select')
    .addEventListener('change', e => load(e.target.value));

  (function () {
    const header = document.getElementById('legend-header');
    const body   = document.getElementById('legend-body');
    const btn    = document.getElementById('legend-toggle');
    header.addEventListener('click', () => {
      const collapsed = body.style.display === 'none';
      body.style.display = collapsed ? '' : 'none';
      btn.textContent   = collapsed ? '▲' : '▼';
    });
  })();

  load('rulesets/tic-tac-toe.json');
</script>
</body>
</html>
